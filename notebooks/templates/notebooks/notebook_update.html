{% extends "base.html" %}

{% block content %}
<div class="page-wrapper">
  <div class="page-header">
    <div>
      <h1 class="page-title">노트북 수정</h1>
      <p class="page-subtitle">노트북 이름을 수정해보세요.</p>
    </div>
  </div>

  <div class="card form-card">
    <form method="post">
      {% csrf_token %}

      <div class="form-group">
        <label for="{{ form.name.id_for_label }}" class="form-label">노트북 이름</label>
        {{ form.name }}
      </div>

      <div class="form-actions">
        <button type="submit" class="primary-btn">수정 완료</button>
        <a href="{% url 'notebooks:notebook_detail' notebook.id %}" class="secondary-btn">취소</a>
      </div>
    </form>
  </div>
</div>
{% endblock content %}
