{% extends "base.html" %}

{% block content %}
<div class="page-wrapper">
  <div class="page-header">
    <div>
      <h1 class="page-title">새 메모 만들기</h1>
      <p class="page-subtitle">제목과 블록을 추가해서 새 글을 작성해보세요.</p>
    </div>
  </div>

  <form method="post" enctype="multipart/form-data" class="card editor-card">
    {% csrf_token %}

    <div class="form-group">
      <label for="post-title" class="form-label">제목</label>
      <input
        id="post-title"
        class="form-input title-input"
        type="text"
        name="title"
        placeholder="제목을 입력하세요"
        required
      >
    </div>

    <div id="block-container" class="block-editor-list"></div>

    <div class="editor-toolbar editor-toolbar-bottom">
      <div class="form-group toolbar-group">
        <label for="block-type-select" class="form-label">블록 추가</label>
        <select id="block-type-select" class="form-input">
          <option value="text">텍스트</option>
          <option value="image">이미지</option>
          <option value="video">동영상</option>
        </select>
      </div>

      <button type="button" id="add-block-btn" class="secondary-btn">블록 추가</button>
    </div>

    <div class="form-actions">
      <button class="primary-btn" type="submit">저장</button>
      <a href="{% url 'notebooks:notebook_detail' notebook.id %}" class="secondary-btn">취소</a>
    </div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script>
  let blockIndex = 0;

  const blockContainer = document.getElementById('block-container');
  const addBtn = document.getElementById('add-block-btn');
  const select = document.getElementById('block-type-select');

  function updateBlockOrder() {
    const blocks = [...blockContainer.querySelectorAll(':scope > .block-item')];

    blocks.forEach((block, orderIndex) => {
      const titleEl = block.querySelector('.block-item-title');
      const orderInput = block.querySelector('.block-order-input');

      if (titleEl) {
        titleEl.textContent = `블록 ${orderIndex + 1}`;
      }

      if (orderInput) {
        orderInput.value = orderIndex;
      }
    });
  }

  function createBlockHtml(type, index) {
    if (type === 'text') {
      return `
        <div class="block-item" data-existing="false">
          <div class="block-item-header">
            <div class="block-item-header-left">
              <button type="button" class="drag-handle" title="드래그해서 이동">☰</button>
              <h3 class="block-item-title">블록 1</h3>
              <span class="block-badge">text</span>
            </div>
            <button type="button" class="danger-btn block-delete-btn">블록 삭제</button>
          </div>

          <input type="hidden" name="blocks[${index}][type]" value="text">
          <input type="hidden" name="blocks[${index}][delete]" value="0" class="delete-flag">
          <input type="hidden" name="blocks[${index}][order]" value="0" class="block-order-input">

          <div class="form-group">
            <label class="form-label">텍스트 내용</label>
            <textarea
              class="form-textarea"
              name="blocks[${index}][content]"
              placeholder="텍스트를 입력하세요"
            ></textarea>
          </div>
        </div>
      `;
    }

    if (type === 'image') {
      return `
        <div class="block-item" data-existing="false">
          <div class="block-item-header">
            <div class="block-item-header-left">
              <button type="button" class="drag-handle" title="드래그해서 이동">☰</button>
              <h3 class="block-item-title">블록 1</h3>
              <span class="block-badge">image</span>
            </div>
            <button type="button" class="danger-btn block-delete-btn">블록 삭제</button>
          </div>

          <input type="hidden" name="blocks[${index}][type]" value="image">
          <input type="hidden" name="blocks[${index}][delete]" value="0" class="delete-flag">
          <input type="hidden" name="blocks[${index}][order]" value="0" class="block-order-input">

          <div class="form-group">
            <label class="form-label">이미지 업로드</label>
            <input
              class="form-input"
              type="file"
              name="blocks[${index}][image]"
              accept="image/*"
            >
          </div>

          <div class="preview-area"></div>
        </div>
      `;
    }

    if (type === 'video') {
      return `
        <div class="block-item" data-existing="false">
          <div class="block-item-header">
            <div class="block-item-header-left">
              <button type="button" class="drag-handle" title="드래그해서 이동">☰</button>
              <h3 class="block-item-title">블록 1</h3>
              <span class="block-badge">video</span>
            </div>
            <button type="button" class="danger-btn block-delete-btn">블록 삭제</button>
          </div>

          <input type="hidden" name="blocks[${index}][type]" value="video">
          <input type="hidden" name="blocks[${index}][delete]" value="0" class="delete-flag">
          <input type="hidden" name="blocks[${index}][order]" value="0" class="block-order-input">

          <div class="form-group">
            <label class="form-label">동영상 업로드</label>
            <input
              class="form-input"
              type="file"
              name="blocks[${index}][video]"
              accept="video/*"
            >
          </div>

          <div class="preview-area"></div>
        </div>
      `;
    }

    return '';
  }

  const sortable = new Sortable(blockContainer, {
    draggable: '.block-item',
    handle: '.drag-handle',
    animation: 150,
    ghostClass: 'sortable-ghost',
    chosenClass: 'sortable-chosen',
    dragClass: 'sortable-drag',
    forceFallback: true,
    fallbackTolerance: 3,
    onEnd() {
      updateBlockOrder();
      console.log('after sort:', [...blockContainer.children].map(el => el.querySelector('.block-item-title')?.textContent));
    }
  });

  addBtn.addEventListener('click', function () {
    const type = select.value;
    const html = createBlockHtml(type, blockIndex);

    blockContainer.insertAdjacentHTML('beforeend', html);
    blockIndex++;
    updateBlockOrder();
  });

  blockContainer.addEventListener('change', function (e) {
    const target = e.target;

    if (target.type !== 'file') return;
    if (!target.files || !target.files[0]) return;

    const file = target.files[0];
    const blockItem = target.closest('.block-item');
    if (!blockItem) return;

    const previewArea = blockItem.querySelector('.preview-area');
    if (!previewArea) return;

    previewArea.innerHTML = '';
    const fileUrl = URL.createObjectURL(file);

    if (target.name.includes('[image]')) {
      const img = document.createElement('img');
      img.src = fileUrl;
      img.alt = '미리보기 이미지';
      previewArea.appendChild(img);
    }

    if (target.name.includes('[video]')) {
      const video = document.createElement('video');
      video.src = fileUrl;
      video.controls = true;
      previewArea.appendChild(video);
    }
  });

  blockContainer.addEventListener('click', function (e) {
    const deleteBtn = e.target.closest('.block-delete-btn');
    if (!deleteBtn) return;

    const blockItem = deleteBtn.closest('.block-item');
    if (!blockItem) return;

    blockItem.remove();
    updateBlockOrder();
  });
</script>
{% endblock content %}
