{% extends "base.html" %}

{% block content %}
<div style="max-width: 600px; margin: 60px auto;">
    <h1>새 비밀번호 설정</h1>

    {% if validlink %}
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">비밀번호 변경</button>
        </form>
    {% else %}
        <p>유효하지 않거나 만료된 링크입니다.</p>
    {% endif %}
</div>
{% endblock %}
