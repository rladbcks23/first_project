{% extends "base.html" %}

{% block content %}
<div style="max-width: 600px; margin: 60px auto;">
    <h1>회원정보 수정</h1>

    <form method="post">
        {% csrf_token %}

        <div style="margin-bottom: 20px;">
            <label for="{{ form.username.id_for_label }}">아이디</label><br>
            {{ form.username }}
            {% if form.username.errors %}
                <div style="color: red;">
                    {{ form.username.errors }}
                </div>
            {% endif %}
        </div>

        <button type="submit">수정 완료</button>
        <a href="{% url 'accounts:profile' %}">취소</a>
    </form>
</div>
{% endblock %}
