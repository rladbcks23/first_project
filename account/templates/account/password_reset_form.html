{% extends "base.html" %}

{% block content %}
<div style="max-width: 600px; margin: 60px auto;">
    <h1>비밀번호 재설정</h1>
    <p>가입한 이메일을 입력하면 비밀번호 재설정 링크를 보내드립니다.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">재설정 메일 보내기</button>
    </form>
</div>
{% endblock %}
